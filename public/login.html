<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoreFlow | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <script src="/assets/js/app.js"></script>
  <script>
    app.renderLayout('Login', `
      <section class="card" style="max-width: 540px; margin: 20px auto;">
        <form id="loginForm" class="form">
          <label>Email<input type="email" name="email" required></label>
          <label>Password<input type="password" name="password" required></label>
          <button class="btn primary" type="submit">Sign In</button>
          <p class="muted">No account? <a href="/register.html">Register here</a>.</p>
          <p id="msg"></p>
        </form>
      </section>
    `);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      msg.textContent = '';

      try {
        const form = new FormData(e.target);
        const payload = {
          email: form.get('email'),
          password: form.get('password')
        };

        const data = await app.api('/auth/login', {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        app.setSession(data);
        window.location.href = '/dashboard.html';
      } catch (error) {
        msg.className = 'warn';
        msg.textContent = error.message;
      }
    });
  </script>
</body>
</html>
